<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
      }
      .card {
        width: 1200px;
        height: 630px;
        background: #141414;
        color: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        font-family: -apple-system, BlinkMacSystemFont, ui-sans-serif, system-ui,
          sans-serif;
      }
      .wordmark {
        font-family: ui-serif, "New York", Georgia, serif;
        font-weight: 600;
        font-size: 168px;
        letter-spacing: -0.01em;
        line-height: 1;
      }
      .tagline {
        font-size: 46px;
        letter-spacing: 0.04em;
        color: #c9c4b8;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="wordmark">Praxa</div>
      <div class="tagline">Everyday Growth</div>
    </div>
  </body>
</html>
